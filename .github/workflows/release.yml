name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "import zigpy_blz; print(f'zigpy-blz {zigpy_blz.__version__} built OK')"
      # Publishing happens from bouffalolab/zigpy-blz, not this fork.
      # This workflow only validates the build.
